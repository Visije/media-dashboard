<!DOCTYPE html>
<html>
<head>
  <title>Creator Flow</title>

  <style>
    body {
      font-family: Segoe UI, sans-serif;
      background: #f6f8fc;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
      color: #222;
    }

    h1 {
      margin-bottom: 24px;
      font-size: 42px;
      font-weight: 800;
    }

    .planner-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.05);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .channel-name {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .platform {
      font-size: 14px;
      color: #777;
      margin-bottom: 14px;
    }

    .target {
      background: #eef3ff;
      color: #4054b2;
      padding: 9px 14px;
      border-radius: 12px;
      font-size: 14px;
      display: inline-block;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .upload-box {
      background: #f9fafc;
      border: 1px solid #edf0f4;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .upload-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .status {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #666;
    }

    .checkbox input {
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    /* MINIMAL NOTES */

    .minimal-notes {
      margin-top: 6px;
    }

    .minimal-notes summary {
      list-style: none;
      cursor: pointer;
      width: 18px;
      height: 18px;
      position: relative;
      user-select: none;
    }

    .minimal-notes summary::-webkit-details-marker {
      display: none;
    }

    .minimal-notes summary::before {
      content: "▸";
      font-size: 15px;
      color: #777;
      transition: transform 0.2s ease;
      display: inline-block;
    }

    .minimal-notes[open] summary::before {
      transform: rotate(90deg);
    }

    .notes {
      margin-top: 10px;
    }

    textarea {
      width: 100%;
      min-height: 70px;
      border: 1px solid #e2e6eb;
      border-radius: 10px;
      padding: 10px;
      resize: vertical;
      font-family: inherit;
      font-size: 14px;
      background: white;
      box-sizing: border-box;
      outline: none;
      transition: border 0.2s ease;
    }

    textarea:focus {
      border-color: #8aa4ff;
    }

    @media (max-width: 900px) {
      .planner-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 34px;
      }

      .channel-name {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
