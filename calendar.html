<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creator Flow</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: "Segoe UI", sans-serif;
      background:#f5f7fb;
      color:#111827;
      padding:40px;
    }

    h1{
      font-size:48px;
      font-weight:700;
      margin-bottom:32px;
      letter-spacing:-1px;
    }

    .planner-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:24px;
    }

    .card{
      background:#ffffff;
      border-radius:24px;
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
    }

    /* TOP */

    .top-section{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:10px;
    }

    .channel-name{
      font-size:20px;
      font-weight:700;
      line-height:1.2;
    }

    .platform{
      margin-top:6px;
      font-size:14px;
      color:#6b7280;
    }

    .target{
      display:inline-block;
      margin-top:18px;
      background:#eef2ff;
      color:#4f46e5;
      padding:10px 14px;
      border-radius:12px;
      font-size:14px;
      font-weight:500;
      margin-bottom:20px;
    }

    /* ACCOUNT NOTES */

    .account-notes{
      position:relative;
    }

    .account-notes summary{
      list-style:none;
      cursor:pointer;
      width:22px;
      height:22px;
    }

    .account-notes summary::-webkit-details-marker{
      display:none;
    }

    .account-notes summary::before{
      content:"▸";
      font-size:18px;
      color:#6b7280;
      transition:0.2s ease;
      display:inline-block;
    }

    .account-notes[open] summary::before{
      transform:rotate(90deg);
    }

    .account-notes textarea{
      position:absolute;
      right:0;
      top:30px;
      width:250px;
      min-height:120px;
      background:#fafafa;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:12px;
      resize:vertical;
      outline:none;
      font-family:inherit;
      box-shadow:0 10px 24px rgba(0,0,0,0.08);
      z-index:10;
    }

    /* REEL BOX */

    .upload-box{
      background:#f8fafc;
      border:1px solid #edf0f4;
      border-radius:18px;
      padding:18px;
      margin-bottom:16px;
    }

    .upload-title{
      font-size:16px;
      font-weight:600;
      margin-bottom:16px;
    }

    .status{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
    }

    .checkbox{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      color:#4b5563;
    }

    input[type="checkbox"]{
      width:16px;
      height:16px;
      cursor:pointer;
      accent-color:#4f46e5;
    }

    /* MOBILE */

    @media(max-width:768px){

      body{
        padding:20px;
      }

      h1{
        font-size:36px;
      }

      .planner-grid{
        grid-template-columns:1fr;
      }

      .account-notes textarea{
        width:220px;
      }

    }

  </style>

</head>

<body>
