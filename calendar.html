<!DOCTYPE html>
<html>
<head>
  <title>Home – Daily Focus</title>
  <style>
    body {
      font-family: Segoe UI, sans-serif;
      background: #f6f8fc;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    h1, h2 { margin: 0 0 10px; }

    .quote {
      font-style: italic;
      color: #555;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .coins span {
      margin-right: 8px;
    }

    .coin {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }

    .bronze { background: #cd7f32; color: #3a220f; }
    .silver { background: #dcdcdc; color: #333; }
    .gold { background: #ffd700; color: #4a3b00; }

    .ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: conic-gradient(#6ab04c 0%, #eaeaea 0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-top: 10px;
    }

    ul {
      padding-left: 18px;
    }

    .muted {
      color: #8a8f94;
      font-style: italic;
    }

    .priority {
      font-size: 18px;
      font-weight: 600;
      color: #111;
    }
  </style>
</head>

<body>

<!-- GREETING + QUOTE -->
<div class="card">
  <h1>Good Morning 👋</h1>
  <p class="quote" id="dailyQuote">
    “Small actions done daily create massive results.”
  </p>
</div>

<!-- STREAKS + PROGRESS -->
<div class="row">

  <div class="card">
    <h2>Consistency</h2>
    <div class="coins">
      <span class="coin bronze">3</span>
      <span class="coin silver">7</span>
      <span class="coin gold">21</span>
    </div>
    <p class="muted">Coins you’ve earned so far</p>
  </div>

  <div class="card">
    <h2>This Week</h2>
    <div class="ring" id="weekRing">0%</div>
    <p id="weekCount" class="muted"></p>
  </div>

</div>

<!-- ONE CLEAR PRIORITY -->
<div class="card">
  <h2>🎯 One Clear Priority (Today)</h2>
  <div class="priority" id="todayPriority">
    Write scripts without distraction
  </div>
</div>

<!-- TODAY TASKS -->
<div class="card">
  <h2>Today’s Tasks</h2>
  <ul id="todayTasks"></ul>
</div>

<!-- SCRIPTS PENDING -->
<div class="card">
  <h2>✍️ Scripts Pending Today</h2>
  <ul id="pendingScripts"></ul>
</div>

</body>
</html>
