<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="page" content="writer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Tracker</title>

<link rel="icon" href="data:,">

<style>

/* =========================
   GLOBAL
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Inter, Segoe UI, sans-serif;
  background:#0f1117;
  color:#f3f5f7;
  padding:32px;
}

/* =========================
   HEADER
========================= */

header{
  margin-bottom:28px;
}

h1{
  font-size:48px;
  font-weight:700;
  letter-spacing:-1px;
}

.subtitle{
  margin-top:8px;
  color:#8b93a7;
  font-size:15px;
}

/* =========================
   NAV
========================= */

.top-nav{
  display:flex;
  gap:12px;
  margin-bottom:28px;
}

.top-nav a{
  text-decoration:none;
  color:#aeb6c7;
  background:#171b24;
  padding:10px 16px;
  border-radius:12px;
  transition:0.2s ease;
  border:1px solid rgba(255,255,255,0.05);
}

.top-nav a:hover{
  background:#1d2230;
  color:#fff;
}

.top-nav .active{
  background:#f3f5f7;
  color:#111;
}

/* =========================
   GLOBAL STATS
========================= */

.stats-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  margin-bottom:28px;
}

.stat-card{
  background:#171b24;
  border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;
  padding:18px;
}

.stat-label{
  color:#8b93a7;
  font-size:13px;
  margin-bottom:8px;
}

.stat-value{
  font-size:28px;
  font-weight:700;
}

/* =========================
   WEEK
========================= */

.week-block{
  margin-bottom:44px;
}

.week-title{
  font-size:28px;
  margin-bottom:22px;
}

/* =========================
   CHANNEL BOARD
========================= */

.channel-board{
  background:#171b24;
  border:1px solid rgba(255,255,255,0.05);
  border-radius:24px;
  padding:22px;
  margin-bottom:26px;
}

/* HEADER */

.channel-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.channel-left{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.channel-name{
  font-size:22px;
  font-weight:700;
}

.channel-meta{
  color:#8b93a7;
  font-size:13px;
}

/* PROGRESS */

.progress-wrap{
  margin-top:10px;
}

.progress-bar{
  width:100%;
  height:10px;
  border-radius:999px;
  overflow:hidden;
  background:#222735;
}

.progress-fill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(
    90deg,
    #6ab04c,
    #8ddf67
  );
}

/* =========================
   KANBAN
========================= */

.kanban{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
  margin-top:24px;
}

.column{
  background:#11151d;
  border-radius:18px;
  padding:14px;
  min-height:220px;
  border:1px solid rgba(255,255,255,0.04);
}

.column-title{
  font-size:14px;
  font-weight:600;
  color:#d8dce5;
  margin-bottom:14px;
}

/* =========================
   SCRIPT CARD
========================= */

.script-card{
  background:#1f2430;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  transition:0.18s ease;
  border:1px solid rgba(255,255,255,0.04);
}

.script-card:hover{
  transform:translateY(-2px);
  background:#252b39;
}

.script-title{
  font-size:15px;
  font-weight:600;
  line-height:1.4;
  margin-bottom:12px;
}

.script-info{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#98a1b3;
  margin-bottom:12px;
}

/* STATUS */

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

.Ideas{
  background:#2a3242;
  color:#b9c1d1;
}

.Research{
  background:#27384a;
  color:#8dc4ff;
}

.Writing{
  background:#4a3922;
  color:#ffcf7a;
}

.Review{
  background:#3b2d52;
  color:#d0a8ff;
}

.Ready{
  background:#1f4d38;
  color:#7ff0b2;
}

.Uploaded{
  background:#3d4454;
  color:#d5dae5;
}

/* =========================
   EMPTY
========================= */

.empty{
  color:#5d6678;
  font-size:13px;
  padding-top:6px;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1200px){

  .kanban{
    grid-template-columns:repeat(2,1fr);
  }

  .stats-row{
    grid-template-columns:repeat(2,1fr);
  }

}

@media(max-width:700px){

  body{
    padding:18px;
  }

  h1{
    font-size:36px;
  }

  .kanban{
    grid-template-columns:1fr;
  }

  .stats-row{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<!-- =========================
ROLE HANDLING
========================= -->

<script>
(function () {
  const role = localStorage.getItem("role");
  if (!role || role === "editor") {
    location.href = "index.html";
  }
})();
</script>

<!-- =========================
HEADER
========================= -->

<header>
  <h1>Script Tracker</h1>
  <p class="subtitle">
    Multi-channel production pipeline
  </p>
</header>

<!-- =========================
NAV
========================= -->

<nav class="top-nav">
  <a href="index.html">Home</a>
  <a href="weekly-dashboard.html">Weekly</a>
  <a href="scripts.html" class="active">Scripts</a>
</nav>

<!-- =========================
GLOBAL STATS
========================= -->

<div class="stats-row">

  <div class="stat-card">
    <div class="stat-label">Ideas</div>
    <div class="stat-value" id="ideasCount">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Writing</div>
    <div class="stat-value" id="writingCount">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Review</div>
    <div class="stat-value" id="reviewCount">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Ready</div>
    <div class="stat-value" id="readyCount">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Uploaded</div>
    <div class="stat-value" id="uploadedCount">0</div>
  </div>

</div>

<!-- =========================
CONTENT
========================= -->

<div id="boards"></div>

<!-- =========================
SCRIPT
========================= -->

<script>

/* =========================
CONFIG
========================= */

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTU4yNw1NlyydNT5CH3XZrGYyS27yZXuK6JKfID416K2nFSwtAznHjlYYySULRP7i8ktOIM54bxl2sn/pub?gid=0&single=true&output=csv";

const channels = [
  "Ender Vij",
  "I'm Gurey",
  "CRUST",
  "Zone-out History",
  "Touristico"
];

const stages = [
  "Ideas",
  "Research",
  "Writing",
  "Review",
  "Ready",
  "Uploaded"
];

/* =========================
CSV PARSER
========================= */

function parseCSV(text){

  const lines = text
    .split("\n")
    .filter(l => l.trim());

  const rows = [];

  for(let i=1;i<lines.length;i++){

    const cols =
      lines[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

    if(cols){
      rows.push(
        cols.map(c =>
          c.replace(/^"|"$/g,"")
        )
      );
    }

  }

  return rows;

}

/* =========================
WEEK RANGE
========================= */

function getWeekRange(dateStr){

  const d = new Date(dateStr);

  if(isNaN(d)) return null;

  const day = d.getDay() || 7;

  const monday = new Date(d);
  monday.setDate(d.getDate() - day + 1);

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  return `
    ${monday.toISOString().slice(0,10)}
    →
    ${sunday.toISOString().slice(0,10)}
  `.replace(/\s+/g," ");

}

/* =========================
FETCH
========================= */

fetch(sheetURL)

.then(res => res.text())

.then(text => {

  const rows = parseCSV(text);

  const boards =
    document.getElementById("boards");

  /* =========================
     GLOBAL COUNTS
  ========================= */

  const counts = {
    Ideas:0,
    Research:0,
    Writing:0,
    Review:0,
    Ready:0,
    Uploaded:0
  };

  rows.forEach(r => {

    const status = r[2];

    if(counts[status] !== undefined){
      counts[status]++;
    }

  });

  document.getElementById("ideasCount").innerText =
    counts.Ideas;

  document.getElementById("writingCount").innerText =
    counts.Writing;

  document.getElementById("reviewCount").innerText =
    counts.Review;

  document.getElementById("readyCount").innerText =
    counts.Ready;

  document.getElementById("uploadedCount").innerText =
    counts.Uploaded;

  /* =========================
     GROUP BY WEEK
  ========================= */

  const weekly = {};

  rows.forEach(r => {

    if(!r[4]) return;

    const week = getWeekRange(r[4]);

    if(!weekly[week]){
      weekly[week] = [];
    }

    weekly[week].push(r);

  });

  /* =========================
     RENDER
  ========================= */

  Object.keys(weekly)
    .sort()
    .reverse()
    .forEach(week => {

      const weekBlock =
        document.createElement("div");

      weekBlock.className = "week-block";

      weekBlock.innerHTML = `
        <h2 class="week-title">
          Week • ${week}
        </h2>
      `;

      channels.forEach(channel => {

        const channelRows =
          weekly[week].filter(
            r => r[1] === channel
          );

        if(!channelRows.length) return;

        const ready =
          channelRows.filter(
            r => r[2] === "Ready"
          ).length;

        const percent =
          Math.round(
            (ready / channelRows.length) * 100
          );

        const board =
          document.createElement("div");

        board.className = "channel-board";

        board.innerHTML = `
          <div class="channel-top">

            <div class="channel-left">

              <div class="channel-name">
                🎬 ${channel}
              </div>

              <div class="channel-meta">
                ${channelRows.length} scripts
                •
                ${ready} ready
              </div>

            </div>

            <div>
              ${percent}% Ready
            </div>

          </div>

          <div class="progress-wrap">

            <div class="progress-bar">
              <div
                class="progress-fill"
                style="width:${percent}%">
              </div>
            </div>

          </div>

          <div class="kanban">

            ${stages.map(stage => {

              const stageRows =
                channelRows.filter(
                  r => r[2] === stage
                );

              return `
                <div class="column">

                  <div class="column-title">
                    ${stage}
                  </div>

                  ${
                    stageRows.length

                    ?

                    stageRows.map(r => `
                      <div class="script-card">

                        <div class="script-title">
                          ${r[0]}
                        </div>

                        <div class="script-info">
                          <span>${r[3]} words</span>
                          <span>${r[4]}</span>
                        </div>

                        <span class="badge ${r[2]}">
                          ${r[2]}
                        </span>

                      </div>
                    `).join("")

                    :

                    `<div class="empty">
                      No scripts
                    </div>`

                  }

                </div>
              `;

            }).join("")}

          </div>
        `;

        weekBlock.appendChild(board);

      });

      boards.appendChild(weekBlock);

    });

})

.catch(() => {

  document.getElementById("boards").innerHTML = `
    <div style="
      color:#ff7b7b;
      margin-top:30px;
      font-size:18px;
    ">
      Failed to load scripts
    </div>
  `;

});

</script>

</body>
</html>
