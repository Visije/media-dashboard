<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="page" content="writer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Library</title>

<link rel="icon" href="data:,">

<style>

/* =========================
   GLOBAL
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0f1117;
  --card:#171b24;
  --card2:#1d2330;
  --card3:#11151d;
  --border:rgba(255,255,255,0.05);
  --text:#f3f5f7;
  --muted:#8b93a7;
}

body{
  font-family: Inter, Segoe UI, sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:32px;
}

/* =========================
   HEADER
========================= */

header{
  margin-bottom:20px;
}

h1{
  font-size:54px;
  font-weight:750;
  letter-spacing:-2px;
  line-height:1;
}

.subtitle{
  margin-top:12px;
  color:var(--muted);
  font-size:15px;
}

/* =========================
   WORKSPACE LABEL
========================= */

.workspace-label{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:30px;
  color:#6f7787;
  font-size:14px;
}

/* =========================
   STATS
========================= */

.stats-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
  margin-bottom:34px;
}

.stat-card{
  background:linear-gradient(
    180deg,
    #171b24,
    #131822
  );

  border:1px solid var(--border);
  border-radius:22px;
  padding:22px;
}

.stat-label{
  color:#8f98aa;
  font-size:13px;
  margin-bottom:10px;
}

.stat-value{
  font-size:36px;
  font-weight:700;
  letter-spacing:-1px;
}

/* =========================
   WEEK BLOCK
========================= */

.week-block{
  margin-bottom:52px;
}

.week-title{
  font-size:36px;
  font-weight:700;
  letter-spacing:-1px;
  margin-bottom:24px;
}

/* =========================
   CHANNEL BOARD
========================= */

.channel-board{
  background:linear-gradient(
    180deg,
    #171b24,
    #141923
  );

  border:1px solid var(--border);
  border-radius:30px;
  padding:28px;
  margin-bottom:30px;
  overflow:hidden;
}

/* =========================
   CHANNEL HEADER
========================= */

.channel-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  margin-bottom:20px;
}

.channel-left{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.channel-name{
  font-size:32px;
  font-weight:700;
  letter-spacing:-1px;
}

.channel-meta{
  color:#8b93a7;
  font-size:14px;
}

.channel-right{
  text-align:right;
}

.channel-percent{
  font-size:30px;
  font-weight:700;
}

.channel-ready{
  color:#7f8a9d;
  font-size:13px;
  margin-top:4px;
}

/* =========================
   PROGRESS
========================= */

.progress-wrap{
  margin-bottom:28px;
}

.progress-bar{
  width:100%;
  height:12px;
  border-radius:999px;
  overflow:hidden;
  background:#232939;
}

.progress-fill{
  height:100%;
  border-radius:999px;

  background:linear-gradient(
    90deg,
    #6ab04c,
    #8ce46b
  );

  box-shadow:
    0 0 12px rgba(106,176,76,0.4);
}

/* =========================
   KANBAN GRID
========================= */

.kanban{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:16px;
}

/* =========================
   COLUMN
========================= */

.column{
  background:var(--card3);
  border-radius:22px;
  padding:16px;
  border:1px solid rgba(255,255,255,0.04);
  min-height:250px;
}

.column-title{
  font-size:14px;
  font-weight:650;
  margin-bottom:16px;
  color:#dce2ee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.column-count{
  color:#758094;
  font-size:12px;
}

/* =========================
   SCRIPT CARD
========================= */

.script-card{
  background:var(--card2);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:18px;
  padding:15px;
  margin-bottom:14px;
  transition:0.18s ease;
  cursor:pointer;
}

.script-card:hover{
  transform:translateY(-2px);
  background:#252c3a;
}

.script-title{
  font-size:15px;
  font-weight:650;
  line-height:1.45;
  margin-bottom:14px;
}

.script-info{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
  color:#8d98ad;
  font-size:12px;
}

.script-bottom{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* =========================
   BADGES
========================= */

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.2px;
}

.Ideas{
  background:#2b3342;
  color:#c4cedf;
}

.Research{
  background:#23384a;
  color:#8dc8ff;
}

.Writing{
  background:#47361f;
  color:#ffcf7a;
}

.Review{
  background:#3b2d52;
  color:#d6b0ff;
}

.Ready{
  background:#1d4c38;
  color:#83efb5;
}

.Uploaded{
  background:#3a4355;
  color:#d4dae7;
}

/* =========================
   EMPTY
========================= */

.empty{
  color:#5f6a7e;
  font-size:13px;
  padding-top:6px;
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-thumb{
  background:#252b38;
  border-radius:999px;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1450px){

  .kanban{
    grid-template-columns:repeat(3,1fr);
  }

}

@media(max-width:1100px){

  .stats-row{
    grid-template-columns:repeat(2,1fr);
  }

  .kanban{
    grid-template-columns:repeat(2,1fr);
  }

}

@media(max-width:700px){

  body{
    padding:18px;
  }

  h1{
    font-size:40px;
  }

  .week-title{
    font-size:28px;
  }

  .channel-name{
    font-size:24px;
  }

  .stats-row{
    grid-template-columns:1fr;
  }

  .kanban{
    grid-template-columns:1fr;
  }

  .channel-top{
    flex-direction:column;
    align-items:flex-start;
  }

}

</style>
</head>

<body>

<!-- =========================
ROLE HANDLING
========================= -->

<script>
(function () {

  const role =
    localStorage.getItem("role");

  if(!role || role === "editor"){
    location.href = "index.html";
  }

})();
</script>

<!-- =========================
HEADER
========================= -->

<header>

  <h1>Script Library</h1>

  <p class="subtitle">
    Multi-channel production pipeline
  </p>

</header>

<!-- =========================
WORKSPACE LABEL
========================= -->

<div class="workspace-label">
  <span>Workspace</span>
  <span>•</span>
  <span>Production Pipeline</span>
</div>

<!-- =========================
GLOBAL STATS
========================= -->

<div class="stats-row">

  <div class="stat-card">
    <div class="stat-label">Ideas</div>
    <div class="stat-value" id="ideasCount">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Research</div>
    <div class="stat-value" id="researchCount">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Writing</div>
    <div class="stat-value" id="writingCount">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Ready</div>
    <div class="stat-value" id="readyCount">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Uploaded</div>
    <div class="stat-value" id="uploadedCount">0</div>
  </div>

</div>

<!-- =========================
BOARDS
========================= -->

<div id="boards"></div>

<!-- =========================
SCRIPT
========================= -->

<script>

/* =========================
CONFIG
========================= */

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTU4yNw1NlyydNT5CH3XZrGYyS27yZXuK6JKfID416K2nFSwtAznHjlYYySULRP7i8ktOIM54bxl2sn/pub?gid=0&single=true&output=csv";

const channels = [
  "Ender Vij",
  "I'm Gurey",
  "CRUST",
  "Zone-out History",
  "Geography"
];

const stages = [
  "Ideas",
  "Research",
  "Writing",
  "Review",
  "Ready",
  "Uploaded"
];

/* =========================
CSV PARSER
========================= */

function parseCSV(text){

  const lines =
    text
    .split("\n")
    .filter(l => l.trim());

  const rows = [];

  for(let i=1;i<lines.length;i++){

    const cols =
      lines[i].match(
        /(".*?"|[^",]+)(?=\s*,|\s*$)/g
      );

    if(cols){

      rows.push(
        cols.map(c =>
          c.replace(/^"|"$/g,"")
        )
      );

    }

  }

  return rows;

}

/* =========================
WEEK RANGE
========================= */

function getWeekRange(dateStr){

  const d = new Date(dateStr);

  if(isNaN(d)) return null;

  const day = d.getDay() || 7;

  const monday = new Date(d);

  monday.setDate(
    d.getDate() - day + 1
  );

  const sunday = new Date(monday);

  sunday.setDate(
    monday.getDate() + 6
  );

  return `
    ${monday.toISOString().slice(0,10)}
    →
    ${sunday.toISOString().slice(0,10)}
  `.replace(/\s+/g," ");

}

/* =========================
FETCH
========================= */

fetch(sheetURL)

.then(res => res.text())

.then(text => {

  const rows = parseCSV(text);

  const boards =
    document.getElementById("boards");

  /* =========================
     GLOBAL COUNTS
  ========================= */

  const counts = {
    Ideas:0,
    Research:0,
    Writing:0,
    Review:0,
    Ready:0,
    Uploaded:0
  };

  rows.forEach(r => {

    const status = r[2];

    if(counts[status] !== undefined){
      counts[status]++;
    }

  });

  document.getElementById("ideasCount").innerText =
    counts.Ideas;

  document.getElementById("researchCount").innerText =
    counts.Research;

  document.getElementById("writingCount").innerText =
    counts.Writing;

  document.getElementById("readyCount").innerText =
    counts.Ready;

  document.getElementById("uploadedCount").innerText =
    counts.Uploaded;

  /* =========================
     GROUP WEEKS
  ========================= */

  const weekly = {};

  rows.forEach(r => {

    if(!r[4]) return;

    const week =
      getWeekRange(r[4]);

    if(!weekly[week]){
      weekly[week] = [];
    }

    weekly[week].push(r);

  });

  /* =========================
     RENDER
  ========================= */

  Object.keys(weekly)
    .sort()
    .reverse()
    .forEach(week => {

      const weekBlock =
        document.createElement("div");

      weekBlock.className =
        "week-block";

      weekBlock.innerHTML = `
        <h2 class="week-title">
          Week • ${week}
        </h2>
      `;

      channels.forEach(channel => {

        const channelRows =
          weekly[week].filter(
            r => r[1] === channel
          );

        if(!channelRows.length) return;

        const ready =
          channelRows.filter(
            r => r[2] === "Ready"
          ).length;

        const percent =
          Math.round(
            (ready / channelRows.length) * 100
          );

        const board =
          document.createElement("div");

        board.className =
          "channel-board";

        board.innerHTML = `

          <div class="channel-top">

            <div class="channel-left">

              <div class="channel-name">
                🎬 ${channel}
              </div>

              <div class="channel-meta">
                ${channelRows.length} scripts
                •
                ${ready} ready
              </div>

            </div>

            <div class="channel-right">

              <div class="channel-percent">
                ${percent}%
              </div>

              <div class="channel-ready">
                Ready
              </div>

            </div>

          </div>

          <div class="progress-wrap">

            <div class="progress-bar">

              <div
                class="progress-fill"
                style="width:${percent}%">
              </div>

            </div>

          </div>

          <div class="kanban">

            ${stages.map(stage => {

              const stageRows =
                channelRows.filter(
                  r => r[2] === stage
                );

              return `

                <div class="column">

                  <div class="column-title">

                    <span>${stage}</span>

                    <span class="column-count">
                      ${stageRows.length}
                    </span>

                  </div>

                  ${
                    stageRows.length

                    ?

                    stageRows.map(r => `

                      <div class="script-card">

                        <div class="script-title">
                          ${r[0]}
                        </div>

                        <div class="script-info">

                          <span>
                            ${r[3]} words
                          </span>

                          <span>
                            ${r[4]}
                          </span>

                        </div>

                        <div class="script-bottom">

                          <span class="badge ${r[2]}">
                            ${r[2]}
                          </span>

                        </div>

                      </div>

                    `).join("")

                    :

                    `<div class="empty">
                      No scripts
                    </div>`

                  }

                </div>

              `;

            }).join("")}

          </div>

        `;

        weekBlock.appendChild(board);

      });

      boards.appendChild(weekBlock);

    });

})

.catch(() => {

  document.getElementById("boards").innerHTML = `

    <div style="
      color:#ff7b7b;
      margin-top:30px;
      font-size:18px;
    ">

      Failed to load scripts

    </div>

  `;

});

</script>

</body>
</html>
